# 넙치 질병 탐지 시스템 - 클래스 및 매핑 설정

# Stage 2: 다중 증상 분류 클래스
symptom_classes:
  0: normal
  1: hemorrhage      # 출혈 (symptom 1,2)
  2: white_spot      # 백점 (symptom 10)
  3: tumor           # 반점/결절 (symptom 4)
  4: color_change    # 체색변화 (symptom 3)
  5: emaciation      # 여윔 (symptom 22)
  6: ulcer           # 궤양 (symptom 11)

# AIHub symptom 코드 → 클래스 매핑
symptom_code_map:
  1: hemorrhage       # 출혈_체표
  2: hemorrhage       # 출혈_지느러미
  3: color_change     # 체색변화
  4: tumor            # 반점/결절
  6: null             # 안구돌출 (제외)
  8: null             # 복부팽만 (제외)
  9: null             # 아가미이상 (제외)
  10: white_spot      # 백점
  11: ulcer           # 궤양
  12: ulcer           # 지느러미부식 → 궤양으로 통합
  22: emaciation      # 여윔
  29: null            # 기타증상 (제외)

# 클래스별 데이터 밸런싱 목표
balance_targets:
  normal: 2000
  hemorrhage: 2000
  white_spot: 2000
  tumor: 1518         # 전체 사용
  color_change: 2000
  emaciation: 134     # 전체 사용
  ulcer: 274          # 전체 사용

# 증상 → 질병 매핑
symptom_disease_map:
  white_spot:
    - name: 스쿠티카병
      probability: 0.7
      contagious: true
    - name: 백점병
      probability: 0.3
      contagious: true
  hemorrhage:
    - name: VHS(바이러스성출혈성패혈증)
      probability: 0.4
      contagious: true
    - name: 비브리오병
      probability: 0.35
      contagious: true
    - name: 연쇄구균증
      probability: 0.25
      contagious: true
  color_change:
    - name: 스쿠티카병
      probability: 0.4
      contagious: true
    - name: 비브리오병
      probability: 0.35
      contagious: true
    - name: 기타
      probability: 0.25
      contagious: false
  tumor:
    - name: 림포시스티스병
      probability: 0.9
      contagious: false
  ulcer:
    - name: 비브리오병
      probability: 0.6
      contagious: true
    - name: 에드워드병
      probability: 0.4
      contagious: true
  emaciation:
    - name: 여윔병
      probability: 0.8
      contagious: false

# 질병 → 대응 가이드
disease_response:
  스쿠티카병:
    action: LOWER_TEMPERATURE
    temperature: "18도 이하로 낮추기"
    detail: "수온이 높을수록 충의 증식과 폐사 증가. 즉시 감염 개체 격리, 사육밀도 낮추기."
    urgency: immediate
    isolate: true
  VHS(바이러스성출혈성패혈증):
    action: RAISE_TEMPERATURE
    temperature: "20도 이상으로 올리기"
    detail: "저수온기 질병. 수온 15도 이상에서 폐사율 감소. 감염 수조 격리, 기구 소독."
    urgency: immediate
    isolate: true
  비브리오병:
    action: ISOLATE_AND_TREAT
    temperature: "유지"
    detail: "감염 어체 격리, 항생제 투여 고려. 수질 관리 강화."
    urgency: danger
    isolate: true
  연쇄구균증:
    action: ISOLATE_AND_TREAT
    temperature: "유지"
    detail: "감염 어체 격리. 수온 관리 및 항생제 치료."
    urgency: danger
    isolate: true
  림포시스티스병:
    action: MONITOR
    temperature: "유지"
    detail: "자연 치유 가능. 스트레스 줄이고 수질 관리에 집중."
    urgency: watch
    isolate: false
  여윔병:
    action: IMPROVE_NUTRITION
    temperature: "유지"
    detail: "사료 품질/양 확인. 밀도 줄이기."
    urgency: watch
    isolate: false
  백점병:
    action: TREAT
    temperature: "수온 점진적 상승 (25~28도)"
    detail: "약욕 처리. 수질 관리 강화."
    urgency: danger
    isolate: true
  기타:
    action: MONITOR
    temperature: "유지"
    detail: "정확한 원인 파악 필요. 수질/사료/환경 점검 후 지속 관찰."
    urgency: watch
    isolate: false
  에드워드병:
    action: ISOLATE_AND_TREAT
    temperature: "유지"
    detail: "내장 출혈, 패혈증 유발. 감염 어체 즉시 격리, 항생제 투여 검토."
    urgency: danger
    isolate: true

# 위험도 점수 (증상별 심각도)
symptom_severity:
  normal: 0
  color_change: 2
  emaciation: 2
  tumor: 3
  hemorrhage: 4
  white_spot: 4
  ulcer: 5

# 질병 + 수온 조합 규칙 (질병 감지 시 온도에 따라 추가 경보)
disease_temperature_rules:
  스쿠티카병:
    condition: ">="
    threshold: 20
    alert: "수온이 높아 스쿠티카병 증식 가속. 즉시 18도 이하로 낮추세요."
    urgency: immediate
  VHS(바이러스성출혈성패혈증):
    condition: "<="
    threshold: 15
    alert: "저수온 환경에서 VHS 확산 위험. 20도 이상으로 올리세요."
    urgency: immediate
  비브리오병:
    condition: ">="
    threshold: 25
    alert: "고수온 환경에서 비브리오균 증식 가속. 수온 낮추고 항생제 투여 검토."
    urgency: danger
  에드워드병:
    condition: ">="
    threshold: 25
    alert: "고수온에서 에드워드균 증식 위험. 수온 관리 강화."
    urgency: danger

# 수질 정상 범위 (넙치 기준)
water_quality_thresholds:
  temperature:
    min: 16
    max: 22
    unit: "°C"
    low_alert: "저수온 주의 - VHS·에드워드병 발병 위험"
    high_alert: "고수온 주의 - 스쿠티카병·비브리오병 위험"
  do:
    min: 7.0
    max: 12.0
    unit: "mg/L"
    low_alert: "용존산소 부족 - 폐사 위험, 즉시 환기 필요"
    high_alert: "용존산소 과포화 - 기포병 주의"
  ph:
    min: 7.0
    max: 8.5
    unit: ""
    low_alert: "pH 낮음 - 산성화로 면역력 저하"
    high_alert: "pH 높음 - 아가미 손상 가능"
  salinity:
    min: 28
    max: 35
    unit: "ppt"
    low_alert: "염도 낮음 - 삼투압 스트레스"
    high_alert: "염도 높음 - 탈수 스트레스"

# 위험도 등급 기준
risk_thresholds:
  watch: 1.5       # score >= 1.5
  danger: 3.0      # score >= 3.0
  immediate: 4.0   # score >= 4.0
  tank_disease_ratio_danger: 0.15
  tank_disease_ratio_immediate: 0.30
